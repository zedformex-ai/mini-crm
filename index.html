<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zedformex CRM</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root {
  --primary:#1f5f99;
  --bg:#f4f8fc;
}

body { margin:0; font-family:Inter; background:var(--bg); }

/* LOGIN */
#loginScreen {
  position:fixed; inset:0;
  background:#1f5f99;
  display:flex; align-items:center; justify-content:center;
}

.login-card {
  background:#eef8eb;
  padding:30px;
  border-radius:16px;
  width:300px;
  display:flex; flex-direction:column; gap:12px;
}

/* APP LAYOUT */
.app {
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#1f5f99;
  color:white;
  padding:20px;
}

.sidebar h3 { margin-top:0; }

.sidebar select, .sidebar button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}

.sidebar button {
  background:white;
  color:#1f5f99;
  font-weight:600;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
  overflow:auto;
}

/* CARD */
.card {
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:14px;
}

/* LEADS */
.lead {
  border:1px solid #e2e8f0;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

.actions {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:8px;
}

button {
  background:#1f5f99;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

input, select, textarea {
  width:100%;
  margin-top:6px;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>CRM</h3>

  <select id="locationSelect">
    <option value="">Location</option>
    <option>Mumbai</option>
    <option>Delhi</option>
    <option>Bangalore</option>
    <option>New York</option>
  </select>

  <select id="businessSelect">
    <option value="">Business</option>
    <option>Chiropractor</option>
    <option>Dentist</option>
    <option>Gym</option>
    <option>Real Estate</option>
  </select>

  <button onclick="initCRM()">Load</button>

  <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<div id="crmSection" style="display:none;">

<div class="card">
  <input type="file" id="fileInput">
  <button onclick="uploadExcel()">Upload Leads</button>
</div>

<div class="card">
  <input id="searchBox" placeholder="Search..." oninput="loadLeads()">

  <select id="statusFilter" onchange="loadLeads()">
    <option value="">All Status</option>
    <option>new</option>
    <option>contacted</option>
    <option>closed</option>
  </select>
</div>

<div class="card">
  <div id="leads"></div>
</div>

</div>

</div>
</div>

<script>

const client = supabase.createClient(
  "https://vdyelzvodduuzmmlocnp.supabase.co",
  "sb_publishable_NQQMb3N8talO7hIHPzcYnw_wzaCh2YW"
);

let selectedLocation=null;
let selectedBusiness=null;

// AUTH
async function login(){
  const {error}=await client.auth.signInWithPassword({
    email:email.value,password:password.value
  });
  if(error) return alert(error.message);
  checkUser();
}
async function logout(){ await client.auth.signOut(); location.reload(); }
async function checkUser(){
  const {data}=await client.auth.getUser();
  if(data.user){
    loginScreen.style.display="none";
    app.style.display="flex";
  }
}

// INIT
function initCRM(){
  const loc=locationSelect.value;
  const biz=businessSelect.value;

  if(!loc||!biz) return alert("Select both");

  selectedLocation=loc;
  selectedBusiness=biz;

  crmSection.style.display="block";
  loadLeads();
}

// UPLOAD
async function uploadExcel(){
  const file=fileInput.files[0];
  if(!file) return alert("Select file");

  const wb=XLSX.read(await file.arrayBuffer());
  const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  const rows=json.map(r=>({
    name:r.name||"",
    phone:(r.phone||"").toString(),
    email:r.email||"",
    location:selectedLocation,
    business_type:selectedBusiness
  }));

  await client.from('leads').upsert(rows,{onConflict:'phone'});

  loadLeads();
}

// LOAD
async function loadLeads(){
  const {data}=await client.from('leads')
    .select('*')
    .eq('location',selectedLocation)
    .eq('business_type',selectedBusiness);

  leads.innerHTML="";

  data.forEach(l=>{
    const div=document.createElement('div');
    div.className="lead";

    div.innerHTML=`
      <b>${l.name}</b><br>
      📞 ${l.phone}<br>
      ✉️ ${l.email||'No email'}<br>

      <div class="actions">
        <button onclick="copy('${l.phone}')">Copy Phone</button>
        ${l.email?`<button onclick="copy('${l.email}')">Copy Email</button>`:''}
        ${l.email?`<button onclick="sendEmail('${l.email}','${l.name}')">Email</button>`:''}
      </div>

      Status:
      <select onchange="updateStatus('${l.id}',this.value)">
        <option ${l.status==='new'?'selected':''}>new</option>
        <option ${l.status==='contacted'?'selected':''}>contacted</option>
        <option ${l.status==='closed'?'selected':''}>closed</option>
      </select>

      Comment:
      <textarea onchange="updateComment('${l.id}',this.value)">
      ${l.comment||''}
      </textarea>
    `;

    leads.appendChild(div);
  });
}

// UTIL
function copy(t){navigator.clipboard.writeText(t);}
function sendEmail(email,name){
  window.open(`mailto:${email}?subject=Follow up&body=Hi ${name}, The discussion was wonderful and extremely insightful for me. Here's the Google Meet link as discussed. Regards`);
}

async function updateStatus(id,status){
  await client.from('leads').update({status}).eq('id',id);
}

async function updateComment(id,comment){
  await client.from('leads').update({comment}).eq('id',id);
}

checkUser();

</script>

</body>
</html>
