<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Zedformex</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= LOGIN ================= */

#loginScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #1f5f99;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-card {
  background: #eef8eb;
  padding: 36px 28px;
  border-radius: 18px;
  width: 90%;
  max-width: 360px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.2);

  display: flex;
  flex-direction: column;
  align-items: center;   /* 🔥 THIS fixes alignment */
  gap: 16px;
}
.login-logo {
  width: 110px;
  display: block;
  margin: 0 auto 10px;   /* 🔥 centers it properly */
}

.login-card input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  background: #ffffff;
  font-size: 14px;
  outline: none;
}
.login-card input,
.login-card button {
  width: 100%;
  max-width: 280px;   /* 🔥 prevents stretching */
}
.login-card input:focus {
  border-color: #1f5f99;
}
.login-card h2 {
  margin: 10px 0 4px;
}
.login-card button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  background: #1f5f99;
  color: white;
  font-weight: 600;
  border: none;
  cursor: pointer;
  margin-top: 6px;
}

.login-card button:hover {
  background: #174a77;
}

/* ================= APP ================= */

:root {
  --primary: #1f5f99;
  --primary-dark: #174a77;
  --bg: #f4f8fc;
}

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: var(--bg);
}

/* HEADER */
.header {
  background: var(--primary);
  padding: 14px 20px;
  display: flex;
  align-items: center;
}

.header img {
  height: 36px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
  margin-bottom: 16px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
}

button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: var(--primary-dark);
}

/* LEADS */
.lead {
  border: 1px solid #e2e8f0;
  padding: 14px;
  border-radius: 10px;
  margin-top: 10px;
}

.actions {
  margin-top: 10px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

textarea {
  width: 100%;
  margin-top: 6px;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
}

/* PROGRESS */
.progress-container {
  margin-top: 10px;
  display: none;
}

.progress-bar-bg {
  background: #e5e7eb;
  border-radius: 10px;
}

.progress-bar {
  height: 8px;
  width: 0%;
  background: linear-gradient(90deg, var(--primary), #22c55e);
}

/* MOBILE */
@media (max-width: 600px) {
  .container { padding: 10px; }
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <img src="logo2.png" class="login-logo">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="header">
    <img src="logo.png">
    <button onclick="logout()" style="margin-left:auto;">Logout</button>
  </div>

  <div class="container">

    <!-- UPLOAD -->
    <div class="card">
      <input type="file" id="fileInput">
      <button onclick="uploadExcel()">Upload Leads</button>

      <div id="progressBox" class="progress-container">
        <div class="progress-bar-bg">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="progressText">Uploading...</div>
      </div>
    </div>

    <!-- FILTER -->
    <div class="card">
      <input id="searchBox" placeholder="Search..." oninput="loadLeads()">

      <select id="statusFilter" onchange="loadLeads()">
        <option value="">All</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="followup">Follow Up</option>
        <option value="closed">Closed</option>
      </select>
    </div>

    <!-- LEADS -->
    <div class="card">
      <div id="leads"></div>
    </div>

  </div>

</div>

<script>

const client = supabase.createClient(
  "https://vdyelzvodduuzmmlocnp.supabase.co",
  "sb_publishable_NQQMb3N8talO7hIHPzcYnw_wzaCh2YW"
);

// LOGIN
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await client.auth.signInWithPassword({ email, password });

  if (error) return alert(error.message);

  checkUser();
}

async function logout() {
  await client.auth.signOut();
  location.reload();
}

async function checkUser() {
  const { data } = await client.auth.getUser();

  if (data.user) {
    document.getElementById('loginScreen').style.display = "none";
    document.getElementById('app').style.display = "block";
    loadLeads();
  } else {
    document.getElementById('loginScreen').style.display = "flex";
    document.getElementById('app').style.display = "none";
  }
}

// UPLOAD
async function uploadExcel() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert("Select file");

  const progressBox = document.getElementById('progressBox');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');

  progressBox.style.display = "block";

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  const rows = json.map(r => ({
    name: r.name || r.Name || "",
    phone: (r.phone || r.Phone || "").toString(),
    email: r.email || "",
    website: r.website || "",
    owner_name: r.owner_name || ""
  }));

  let uploaded = 0;

  for (let i = 0; i < rows.length; i += 20) {
    const chunk = rows.slice(i, i + 20);

    const { error } = await client.from('leads')
      .upsert(chunk, { onConflict: 'phone' });

    if (error) return alert(error.message);

    uploaded += chunk.length;
    const percent = Math.round((uploaded / rows.length) * 100);
    progressBar.style.width = percent + "%";
    progressText.innerText = `Uploading ${percent}%`;
  }

  progressText.innerText = "Done";
  loadLeads();
}

// LOAD
async function loadLeads() {
  const search = document.getElementById("searchBox").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;

  const { data } = await client.from('leads').select('*').limit(100);

  const container = document.getElementById('leads');
  container.innerHTML = "";

  data
    .filter(l =>
      ((l.name || "").toLowerCase().includes(search) ||
       (l.phone || "").includes(search)) &&
      (!status || l.status === status)
    )
    .forEach(lead => {
      const div = document.createElement('div');
      div.className = "lead";

      div.innerHTML = `
        <b>${lead.name || ''}</b><br>
        📞 ${lead.phone || ''}<br>
        ✉️ ${lead.email || 'No email'}
        🌐 ${lead.website 
  ? `<a href="${lead.website.startsWith('http') ? lead.website : 'https://' + lead.website}" target="_blank">Visit</a>` 
  : 'No website'}
<br>
        <br>

        <div class="actions">
          <button onclick="copy('${lead.phone}')">Copy Phone</button>
          ${lead.email ? `<button onclick="copy('${lead.email}')">Copy Email</button>` : ""}
          ${lead.email ? `<button onclick="sendEmail('${lead.email}', '${lead.name}')">Send Email</button>` : ""}
        </div>

        <br>

        Status:
        <select onchange="updateStatus('${lead.id}', this.value)">
          <option ${lead.status==='new'?'selected':''}>new</option>
          <option ${lead.status==='contacted'?'selected':''}>contacted</option>
          <option ${lead.status==='followup'?'selected':''}>followup</option>
          <option ${lead.status==='closed'?'selected':''}>closed</option>
        </select>

        <br><br>

        Comment:
        <textarea onchange="updateComment('${lead.id}', this.value)">${lead.comment || ''}</textarea>
      `;

      container.appendChild(div);
    });
}

// UTIL
function copy(text) {
  navigator.clipboard.writeText(text);
}

async function updateStatus(id, status) {
  await client.from('leads').update({ status }).eq('id', id);
}

async function updateComment(id, comment) {
  await client.from('leads').update({ comment }).eq('id', id);
}

function sendEmail(email, name) {
  const subject = encodeURIComponent("Quick follow-up");
  const body = encodeURIComponent(`Hi ${name || ""},

Let’s connect:
https://meet.google.com/new`);

  window.open(`mailto:${email}?subject=${subject}&body=${body}`);
}

checkUser();

</script>

</body>
</html>
