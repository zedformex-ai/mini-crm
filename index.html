<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zedformex CRM</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root {
  --primary:#1f5f99;
  --primary-dark:#174a77;
  --bg:#f4f8fc;
}

body { font-family:Inter; margin:0; background:var(--bg); }

/* LOGIN */
#loginScreen {
  position:fixed; inset:0;
  background:#1f5f99;
  display:flex; align-items:center; justify-content:center;
}

.login-card {
  background:#eef8eb;
  padding:30px;
  border-radius:18px;
  width:90%; max-width:360px;
  display:flex; flex-direction:column; align-items:center; gap:14px;
}

.login-card input, .login-card button {
  width:100%; max-width:280px;
  padding:12px; border-radius:10px;
}

.login-card button {
  background:var(--primary); color:white; border:none;
}

/* APP */
.header {
  background:var(--primary);
  padding:14px;
  display:flex;
}

.header img { height:34px; }

.container { max-width:900px; margin:auto; padding:15px; }

.card {
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:14px;
}

/* BUTTON GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.grid button {
  padding:12px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:10px;
}

/* LEADS */
.lead {
  border:1px solid #e2e8f0;
  padding:14px;
  border-radius:10px;
  margin-top:10px;
}

textarea, input, select {
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #e2e8f0;
}

.actions {
  margin-top:10px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.progress-container { display:none; margin-top:10px; }
.progress-bar { height:8px; width:0%; background:linear-gradient(90deg,var(--primary),#22c55e); }

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <img src="logo2.png" width="100">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="header">
  <img src="logo.png">
  <button onclick="logout()" style="margin-left:auto;">Logout</button>
</div>

<div class="container">

<!-- LOCATION -->
<div class="card" id="locationStep">
  <h3>Select Location</h3>
  <div class="grid">
    <button onclick="selectLocation('Mumbai')">Mumbai</button>
    <button onclick="selectLocation('Delhi')">Delhi</button>
  </div>
</div>

<!-- BUSINESS -->
<div class="card" id="businessStep" style="display:none;">
  <h3>Select Business Type</h3>
  <div class="grid">
    <button onclick="selectBusiness('Chiropractor')">Chiropractor</button>
    <button onclick="selectBusiness('Dentist')">Dentist</button>
  </div>
</div>

<!-- CRM -->
<div id="crmSection" style="display:none;">

<div class="card">
  <input type="file" id="fileInput">
  <button onclick="uploadExcel()">Upload Leads</button>

  <div class="progress-container" id="progressBox">
    <div id="progressBar" class="progress-bar"></div>
    <div id="progressText">Uploading...</div>
  </div>
</div>

<div class="card">
  <input id="searchBox" placeholder="Search..." oninput="loadLeads()">

  <select id="statusFilter" onchange="loadLeads()">
    <option value="">All</option>
    <option value="new">New</option>
    <option value="contacted">Contacted</option>
    <option value="followup">Follow Up</option>
    <option value="closed">Closed</option>
  </select>

  <select id="leadTypeFilter" onchange="loadLeads()">
    <option value="">All Types</option>
    <option>Cold lead</option>
    <option>Showed Interest</option>
    <option>Hot lead</option>
    <option>Not interested</option>
  </select>
</div>

<div class="card">
  <div id="leads"></div>
</div>

</div>
</div>
</div>

<script>

const client = supabase.createClient(
  "https://vdyelzvodduuzmmlocnp.supabase.co",
  "sb_publishable_NQQMb3N8talO7hIHPzcYnw_wzaCh2YW"
);

let selectedLocation=null;
let selectedBusiness=null;

// AUTH
async function login(){
  const {error}=await client.auth.signInWithPassword({
    email:email.value,password:password.value
  });
  if(error) return alert(error.message);
  checkUser();
}
async function logout(){ await client.auth.signOut(); location.reload(); }
async function checkUser(){
  const {data}=await client.auth.getUser();
  if(data.user){
    loginScreen.style.display="none";
    app.style.display="block";
  }
}

// NAV
function selectLocation(loc){
  selectedLocation=loc;
  businessStep.style.display="block";
}
function selectBusiness(type){
  selectedBusiness=type;
  crmSection.style.display="block";
  loadLeads();
}

// UPLOAD
async function uploadExcel(){
  const file=fileInput.files[0];
  if(!file) return alert("Select file");

  progressBox.style.display="block";

  const wb=XLSX.read(await file.arrayBuffer());
  const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  const rows=json.map(r=>({
    name:r.name||"",
    phone:(r.phone||"").toString(),
    email:r.email||"",
    website:r.website||"",
    location:selectedLocation,
    business_type:selectedBusiness
  }));

  for(let i=0;i<rows.length;i+=20){
    const chunk=rows.slice(i,i+20);
    const {error}=await client.from('leads')
      .upsert(chunk,{onConflict:'phone'});
    if(error) return alert(error.message);

    progressBar.style.width=((i+20)/rows.length*100)+"%";
  }

  progressText.innerText="Done";
  loadLeads();
}

// LOAD
async function loadLeads(){
  const {data}=await client.from('leads')
    .select('*')
    .eq('location',selectedLocation)
    .eq('business_type',selectedBusiness)
    .limit(100);

  leads.innerHTML="";

  data.forEach(l=>{
    const div=document.createElement('div');
    div.className="lead";

    div.innerHTML=`
      <b>${l.name}</b><br>
      📞 ${l.phone}<br>
      ✉️ ${l.email||'No email'}<br>

      <div class="actions">
        <button onclick="copy('${l.phone}')">Phone</button>
        ${l.email?`<button onclick="copy('${l.email}')">Email</button>`:''}
      </div>

      Status:
      <select onchange="updateStatus('${l.id}',this.value)">
        <option ${l.status==='new'?'selected':''}>new</option>
        <option ${l.status==='contacted'?'selected':''}>contacted</option>
        <option ${l.status==='closed'?'selected':''}>closed</option>
      </select>

      Comment:
      <textarea onchange="updateComment('${l.id}',this.value)">
      ${l.comment||''}
      </textarea>
    `;

    leads.appendChild(div);
  });
}

// UTIL
function copy(t){navigator.clipboard.writeText(t);}
async function updateStatus(id,status){
  await client.from('leads').update({status}).eq('id',id);
}
async function updateComment(id,comment){
  await client.from('leads').update({comment}).eq('id',id);
}

checkUser();

</script>

</body>
</html>
