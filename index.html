<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zedformex CRM</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #1f5f99;
  --primary-dark: #174a77;
  --bg: #f4f8fc;
}

* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  margin: 0;
}

/* HEADER */
.header {
  background: var(--primary);
  padding: 14px 20px;
}
.header img {
  height: 36px;
}

/* LAYOUT */
.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
  margin-bottom: 16px;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  font-size: 14px;
}

button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  font-weight: 500;
  cursor: pointer;
}

button:hover {
  background: var(--primary-dark);
}

/* LEADS */
.lead {
  border: 1px solid #e2e8f0;
  padding: 14px;
  border-radius: 10px;
  margin-top: 10px;
}

.lead-name {
  font-weight: 600;
}

.phone {
  color: var(--primary);
}

.actions {
  margin-top: 10px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

textarea {
  width: 100%;
  margin-top: 6px;
  border-radius: 8px;
  padding: 8px;
  border: 1px solid #e2e8f0;
}

/* PROGRESS */
.progress-container {
  margin-top: 10px;
  display: none;
}

.progress-bar-bg {
  background: #e5e7eb;
  border-radius: 10px;
}

.progress-bar {
  height: 8px;
  width: 0%;
  background: linear-gradient(90deg, var(--primary), #22c55e);
}

/* MOBILE */
@media (max-width: 600px) {
  .controls { flex-direction: column; }
  input, select, button { width: 100%; font-size: 16px; }
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
</div>

<div class="container">

  <!-- UPLOAD -->
  <div class="card">
    <div class="controls">
      <input type="file" id="fileInput">
      <button onclick="uploadExcel()">Upload Leads</button>
    </div>

    <div id="progressBox" class="progress-container">
      <div class="progress-bar-bg">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div id="progressText">Uploading...</div>
    </div>
  </div>

  <!-- FILTER -->
  <div class="card">
    <div class="controls">
      <input id="searchBox" placeholder="Search..." oninput="loadLeads()">

      <select id="statusFilter" onchange="loadLeads()">
        <option value="">All</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="followup">Follow Up</option>
        <option value="closed">Closed</option>
      </select>
    </div>
  </div>

  <!-- LEADS -->
  <div class="card">
    <div id="leads"></div>
  </div>

</div>

<script>

const client = supabase.createClient(
  "https://vdyelzvodduuzmmlocnp.supabase.co",
  "sb_publishable_NQQMb3N8talO7hIHPzcYnw_wzaCh2YW"
);


// 🔥 FIXED UPLOAD
async function uploadExcel() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert("Select a file");

  const progressBox = document.getElementById('progressBox');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');

  progressBox.style.display = "block";
  progressBar.style.width = "0%";
  progressText.innerText = "Reading file...";

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  const rows = json.map(r => ({
    name: r.name || r.Name || "",
    phone: (r.phone || r.Phone || "").toString(),
    email: r.email || "",
    website: r.website || "",
    owner_name: r.owner_name || ""
  }));

  let uploaded = 0;
  const chunkSize = 20;

  for (let i = 0; i < rows.length; i += chunkSize) {
    const chunk = rows.slice(i, i + chunkSize);

    const { error } = await client.from('leads').insert(chunk);

    if (error) {
      alert(error.message);
      return;
    }

    uploaded += chunk.length;
    const percent = Math.round((uploaded / rows.length) * 100);
    progressBar.style.width = percent + "%";
    progressText.innerText = `Uploading ${percent}%`;
  }

  progressText.innerText = "Done ✅";
  loadLeads();
}


// LOAD
async function loadLeads() {
  const search = document.getElementById("searchBox").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;

  const { data } = await client.from('leads').select('*').limit(100);

  const filtered = data.filter(l => {
    const matchSearch =
      (l.name || "").toLowerCase().includes(search) ||
      (l.phone || "").includes(search);

    const matchStatus = status ? l.status === status : true;

    return matchSearch && matchStatus;
  });

  const container = document.getElementById('leads');
  container.innerHTML = "";

  filtered.forEach(lead => {
    const div = document.createElement('div');
    div.className = "lead";

    div.innerHTML = `
      <div class="lead-name">${lead.name || ''}</div>
      <div class="phone">📞 ${lead.phone || ''}</div>
      <div>
  ✉️ ${lead.email || 'No email'}
</div>

<div class="actions">
  <button onclick="copy('${lead.phone}')">Copy Phone</button>

  ${lead.email ? `
    <button onclick="copy('${lead.email}')">Copy Email</button>
    <button onclick="sendEmail('${lead.email}', '${lead.name}')">Send Email</button>
  ` : ''}
</div>

      <br>

      Status:
      <select onchange="updateStatus('${lead.id}', this.value)">
        <option ${lead.status==='new'?'selected':''}>new</option>
        <option ${lead.status==='contacted'?'selected':''}>contacted</option>
        <option ${lead.status==='followup'?'selected':''}>followup</option>
        <option ${lead.status==='closed'?'selected':''}>closed</option>
      </select>

      <br><br>

      Comment:
      <textarea onchange="updateComment('${lead.id}', this.value)">${lead.comment || ''}</textarea>
    `;

    container.appendChild(div);
  });
}


// UTIL
function copy(text) {
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

async function updateStatus(id, status) {
  await client.from('leads').update({ status }).eq('id', id);
}

async function updateComment(id, comment) {
  await client.from('leads').update({ comment }).eq('id', id);
}

function sendEmail(email, name) {
  if (!email) return alert("No email available");

  const subject = encodeURIComponent("Quick follow-up");
  const body = encodeURIComponent(
`Hi ${name || ""},

Great speaking with you.

Here’s a Google Meet link:
https://meet.google.com/new

Regards`
  );

  window.open(`mailto:${email}?subject=${subject}&body=${body}`);
}

loadLeads();

</script>

</body>
</html>
