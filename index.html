<style>

* {
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  margin: 0;
  padding: 30px;

}

.container {
  max-width: 900px;
  margin: auto;
}

.header {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 22px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

.instructions {
  font-size: 14px;
  color: #64748b;
  margin-bottom: 12px;
}

input[type="file"] {
  margin-top: 10px;
}

button {
  background: #4f46e5;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #4338ca;
}

.lead {
  border: 1px solid #e2e8f0;
  padding: 14px;
  border-radius: 10px;
  margin-top: 12px;
  transition: 0.2s;
}

.lead:hover {
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.lead-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.phone {
  color: #6366f1;
  font-weight: 500;
}

textarea {
  width: 100%;
  height: 60px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  padding: 6px;
}

select {
  margin-top: 6px;
  border-radius: 6px;
  padding: 4px;
}

.progress-container {
  margin-top: 12px;
  display: none;
}

.progress-bar-bg {
  background: #e5e7eb;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 10px;
  width: 0%;
  background: linear-gradient(90deg, #4f46e5, #22c55e);
  transition: 0.3s;
}

.progress-text {
  font-size: 13px;
  margin-top: 4px;
  color: #475569;
}

.copy-btn {
  background: #10b981;
}

.copy-btn:hover {
  background: #059669;
}

</style>

</head>

<script>

const SUPABASE_URL = "https://vdyelzvodduuzmmlocnp.supabase.co";
const SUPABASE_KEY = "sb_publishable_NQQMb3N8talO7hIHPzcYnw_wzaCh2YW";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


// UPLOAD
async function uploadExcel() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert("Select a file");

  const progressBox = document.getElementById('progressBox');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');

  progressBox.style.display = "block";

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  const rows = json.map(r => ({
    name: r.name || r.Name || "",
    phone: (r.phone || r.Phone || "").toString()
  }));

  let uploaded = 0;
  const chunkSize = 50;

  for (let i = 0; i < rows.length; i += chunkSize) {
    const chunk = rows.slice(i, i + chunkSize);

    const { error } = await client.from('leads').insert(chunk);
    if (error) return alert(error.message);

    uploaded += chunk.length;

    const percent = Math.round((uploaded / rows.length) * 100);
    progressBar.style.width = percent + "%";
    progressText.innerText = `Uploading ${percent}%`;
  }

  progressText.innerText = "Done!";
  loadLeads();
}


// LOAD

  const { data, error } = await client
    .from('leads')
    .select('*')
    .order('created_at', { ascending: false });

// UTIL
function copy(text) {
navigator.clipboard.writeText(text);
}

async function updateStatus(id, status) {
await client.from('leads').update({ status }).eq('id', id);
}

async function updateComment(id, comment) {
await client.from('leads').update({ comment }).eq('id', id);
}

loadLeads();
