<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini CRM</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  margin: 0;
  padding: 30px;
  color: #1e293b;
}

.container {
  max-width: 900px;
  margin: auto;
}

.header {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 22px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

.instructions {
  font-size: 14px;
  color: #64748b;
  margin-bottom: 12px;
}

button {
  background: #4f46e5;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  font-weight: 500;
  cursor: pointer;
}

button:hover {
  background: #4338ca;
}

input, select {
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
}

.top-controls {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.lead {
  border: 1px solid #e2e8f0;
  padding: 14px;
  border-radius: 10px;
  margin-top: 12px;
  transition: 0.2s;
}

.lead:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.06);
}

.phone {
  color: #6366f1;
  font-weight: 500;
}

textarea {
  width: 100%;
  height: 60px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  padding: 6px;
}

.progress-container {
  margin-top: 12px;
  display: none;
}

.progress-bar-bg {
  background: #e5e7eb;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 10px;
  width: 0%;
  background: linear-gradient(90deg, #4f46e5, #22c55e);
}

.progress-text {
  font-size: 13px;
  margin-top: 4px;
}

.action-row {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
</style>

</head>

<body>

<div class="container">

  <div class="header">📊 Mini CRM</div>

  <div class="card">
    <div class="instructions">
      Upload Excel with <b>name</b> and <b>phone</b>
    </div>

    <input type="file" id="fileInput">
    <button onclick="uploadExcel()">Upload Leads</button>

    <div id="progressBox" class="progress-container">
      <div class="progress-bar-bg">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div id="progressText" class="progress-text">Uploading...</div>
    </div>
  </div>

  <div class="card">

    <div class="top-controls">
      <input id="searchBox" placeholder="Search name or phone..." oninput="loadLeads()" style="flex:1;">
      
      <select id="statusFilter" onchange="loadLeads()">
        <option value="">All</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="followup">Follow Up</option>
        <option value="closed">Closed</option>
      </select>
    </div>

    <h3>📞 Leads</h3>
    <div id="leads"></div>

  </div>

</div>

<script>

const SUPABASE_URL = "https://vdyelzvodduuzmmlocnp.supabase.co";
const SUPABASE_KEY = "sb_publishable_NQQMb3N8talO7hIHPzcYnw_wzaCh2YW";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


// UPLOAD
async function uploadExcel() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert("Select a file");

  const progressBox = document.getElementById('progressBox');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');

  progressBox.style.display = "block";

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  const rows = json.map(r => ({
    name: r.name || r.Name || "",
    phone: (r.phone || r.Phone || "").toString()
  })).filter(r => r.name && r.phone);

  let uploaded = 0;
  const chunkSize = 50;

  for (let i = 0; i < rows.length; i += chunkSize) {
    const chunk = rows.slice(i, i + chunkSize);

    const { error } = await client.from('leads').insert(chunk);
    if (error) return alert(error.message);

    uploaded += chunk.length;

    const percent = Math.round((uploaded / rows.length) * 100);
    progressBar.style.width = percent + "%";
    progressText.innerText = `Uploading ${percent}%`;
  }

  progressText.innerText = "Done!";
  await loadLeads();
}


// LOAD
async function loadLeads() {

  const search = document.getElementById("searchBox")?.value?.toLowerCase() || "";
  const statusFilter = document.getElementById("statusFilter")?.value;

  const { data, error } = await client
    .from('leads')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    alert(error.message);
    return;
  }

  const filtered = data.filter(l => {
    const matchSearch =
      (l.name || "").toLowerCase().includes(search) ||
      (l.phone || "").includes(search);

    const matchStatus = statusFilter ? l.status === statusFilter : true;

    return matchSearch && matchStatus;
  });

  const container = document.getElementById('leads');
  container.innerHTML = "";

  filtered.forEach(lead => {
    const div = document.createElement('div');
    div.className = "lead";

    div.innerHTML = `
      <b>${lead.name}</b><br>
      <span class="phone">📞 ${lead.phone}</span><br><br>

      Status:
      <select onchange="updateStatus('${lead.id}', this.value)">
        <option ${lead.status==='new'?'selected':''}>new</option>
        <option ${lead.status==='contacted'?'selected':''}>contacted</option>
        <option ${lead.status==='followup'?'selected':''}>followup</option>
        <option ${lead.status==='closed'?'selected':''}>closed</option>
      </select>

      <br><br>

      Comment:
      <textarea onchange="updateComment('${lead.id}', this.value)">${lead.comment || ""}</textarea>

      <div class="action-row">
        <button onclick="copy('${lead.phone}')">📋 Copy</button>
        <button onclick="updateStatus('${lead.id}','contacted')">✅ Contacted</button>
        <button onclick="updateStatus('${lead.id}','closed')">✔ Close</button>
      </div>
    `;

    container.appendChild(div);
  });
}


// UTIL
function copy(text) {
  navigator.clipboard.writeText(text);
}

async function updateStatus(id, status) {
  await client.from('leads').update({ status }).eq('id', id);
  loadLeads();
}

async function updateComment(id, comment) {
  await client.from('leads').update({ comment }).eq('id', id);
}

loadLeads();

</script>

</body>
</html>
